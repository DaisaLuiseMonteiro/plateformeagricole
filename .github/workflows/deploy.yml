name: Deploy AgroConnect

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      backend: ${{ steps.changes.outputs.backend }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            frontend:
              - 'front_agroconnect/**'
            backend:
              - 'back_agroconnect/**'

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Frontend Build Check
        run: |
          cd front_agroconnect
          npm install
          npm run build
          
      - name: Backend Syntax Check
        run: |
          cd back_agroconnect
          python3 -m compileall .

  deploy-frontend:
    needs: [filter, build-check]
    if: |
      always() && 
      (needs.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.build-check.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deploy to Vercel
        run: |
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes --cwd ./front_agroconnect
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    needs: [filter, build-check]
    if: |
      always() && 
      (needs.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.build-check.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK is not set in GitHub Secrets."
            exit 1
          fi
          curl -fsSL -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
